services:
  # ── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iads-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: iaads
      POSTGRES_USER: iaads
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /datos/iads/db:/var/lib/postgresql/data
    ports:
      - "65432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iaads -d iaads"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [edge]

  # ── Migraciones (solo se corre con --profile migrate) ─────────────────────
  # Imagen construida desde Dockerfile.migrate (node + prisma CLI).
  # Monta el schema desde /datos/iads/prisma (rsynced desde local).
  migrator:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: iads-migrator
    environment:
      DATABASE_URL: postgresql://iaads:${DB_PASSWORD}@postgres:5432/iaads
    volumes:
      - /datos/iads/prisma:/prisma:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]
    restart: "no"
    profiles: ["migrate"]

  # ── Aplicación Next.js ────────────────────────────────────────────────────
  # Usa imagen node genérica. El código vive en /datos/iads/app (volumen).
  # Para actualizar: rsync del build local + docker restart iads-web.
  web:
    image: node:20-alpine
    container_name: iads-web
    restart: unless-stopped
    working_dir: /app
    command: node apps/web/server.js
    volumes:
      - /datos/iads/app:/app:ro
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://iaads:${DB_PASSWORD}@postgres:5432/iaads
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # HubSpot
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
      HUBSPOT_PIPELINE_ID: ${HUBSPOT_PIPELINE_ID:-default}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_FROM: ${EMAIL_FROM:-IA ADS <noreply@iads.mtdmcompany.com>}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SHOW_EMAIL_CODE: ${SHOW_EMAIL_CODE:-false}
      # SMS
      SMS_PROVIDER: ${SMS_PROVIDER:-log}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      SHOW_SMS_CODE: ${SHOW_SMS_CODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]
    labels:
      - traefik.enable=true

      # Router HTTPS
      - traefik.http.routers.iads.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.iads.entrypoints=websecure
      - traefik.http.routers.iads.tls=true
      - traefik.http.routers.iads.tls.certresolver=lehttp

      # Pasar HTTPS correctamente al backend
      - traefik.http.middlewares.iads-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.iads-headers.headers.customrequestheaders.X-Forwarded-Ssl=on
      - traefik.http.routers.iads.middlewares=iads-headers

      # Puerto interno de Next.js
      - traefik.http.services.iads.loadbalancer.server.port=3000

      # Red de Traefik
      - traefik.docker.network=edge

networks:
  edge:
    external: true
